<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>

    <link rel="stylesheet" href="./Styles/add_task.css">
    <link rel="stylesheet" href="./Styles/Desktop_template.css">
    <link rel="stylesheet" href="./Styles/fontStyles.css">
    <link rel="stylesheet" href="./Styles/mobile_tamplate.css">
    <link rel="stylesheet" href="Styles/add_task_responsive.css">
    <link rel="stylesheet" href="./node_modules/viewerjs/dist/viewer.css">
    <link rel="stylesheet" href="./Styles/viewer-custom.css">
    <script src="./assets/js/contact_Template.js"></script>
    <script src="./assets/js/contact_Form_Validation.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/addTask_Contact.js"></script>
    <script src="./assets/js/addTask.js"></script>
    <script src="./assets/js/script_Template.js"></script>
    <script src="./assets/js/script_Sidebar.js"></script>
    <script src="./assets/js/add_Task_Validation.js"></script>
    <script src="./assets/js/addTask_Template.js"></script>
    <script src="./node_modules/viewerjs/dist/viewer.js"></script>

    <link rel="icon" type="image/x-icon" href="./assets/IMG/Capa 2.png" />

</head>

<body onclick="closelist()" onload="init()">

    <header>



        <div w3-include-html="./assets/Templates/desktop_template.html"></div>
        <div class="headblock">
            <div class="headblock-inner">
                <div class="title">
                    <span class="kanbanBoardTitle">Kanban Projekt Management Tool</span>
                    <img src="./assets/IMG/Capa 3.png" alt="MobileIcon" class="MobileIcon">
                </div>
                <div class="headUserContainer">
                    <a href="help.html" class="help-link">
                        <img src="./assets/IMG/help.png" alt="Hilfe" class="help-icon">
                    </a>
                    <div class="logInUser_Container" onclick="showLogOutSection();">
                        <span class="logInUser" id="loginUserId"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="logoutId"></div>

    </header>
    <div class="add_task_content" onclick="closelist(); closelistCategory()">

        <div class="header_COntainer">
            <h1 class="headline_addTask">Add Task</h1>
        </div>

        <form id="form_addtask" class="addTask_Container">
            <div class="input_Task_Container_left">
                <div class="Title_Container">
                    <label class="label" for="title">Title<span class="red">*</span></label>
                    <input id="title" placeholder="Enter a Title" class="input_Title" required type="text">
                    <div class="titlemissingmsg" id="titleMissing"></div>
                </div>
                <div class="Description_Container">
                    <label class="label" for="Description">Description</label>
                    <textarea id="Description" class="input_Description" placeholder="Enter a Description"></textarea>
                </div>
                <div class="date_Container">
                    <label class="label" for="dueDate">Due date <span class="red">*</span></label>
                    <input onclick="dateinput()" id="dueDate" placeholder="dd/mm/yyyy" class="input_date" required
                        type="date" onblur="checkValidationDate()">
                    <div class="wrongdatemsg" id="WrongCurrentDateId"> </div>
                </div>

                <div class="Prio_Container">
                    <span class="prio_Header">Prio</span>
                    <div id="Prio_btn_Container" class="Prio_btn_Container">
                    </div>
                </div>
                <div onclick="func1(event)" class="cataegory_Container">
                    <label class="label" for="Category">Category <span class="red">*</span></label>
                    <div id="select_containerId" class="select_container" onclick="openCategoryLIst(event)" tabindex="0"
                        onkeydown="if(event.key==='Enter'||event.key===' ') openCategoryLIst(event)">
                        <span id="Category" class="Category_Input">Select Category</span>
                        <div id="arrow_img_container_Category">
                            <img class="arrow_drop_downaa" src="assets/IMG/arrow_drop_downaa.svg" alt="">
                        </div>
                    </div>
                    <div id="Selection_Container_Category-List" class="Selection_Container_Category-list d_none">
                        <div onclick="choosedUserStory(event)" id="userStory" class="userStory" tabindex="0"
                            onkeydown="if(event.key==='Enter') choosedUserStory(event)">User Story</div>
                        <div onclick="choosedTechnicalTask(event)" id="technicalTask" class="technical_Task"
                            tabindex="0" onkeydown="if(event.key==='Enter') choosedTechnicalTask(event)">Technical Task
                        </div>
                    </div>
                    <div class="categorymissingmsg" id="InputFieldsMissing"></div>
                </div>



                <div id="Selection_Container_Category" class="Selection_Container_Category d_none">
                </div>



            </div>

            <div class="dividing_Line"></div>

            <div class="Task_Container_right">

                <div class="File_Upload_Container">
                    <label class="label" for="Filepicker">Attachments</label>
                    <span class="attachments_info">Allowed file types are JPEG and PNG</span>
                    <div id="error-toast" class="error-toast">
                        <span style="font-size: 14px; font-weight: 500;">Dieses Dateiformat ist nicht
                            erlaubt!</span>
                        <span style="font-size: 13px; opacity: 0.9;">Nur JPEG und PNG sind erlaubt.</span>
                        <button class="close-btn" onclick="hideToast()">&#x2715;</button>
                    </div>
                    <button type="button" class="upload_button_container"
                        onclick="document.getElementById('Filepicker').click()">
                        <span class="upload_button_text">Drag a file or Browse</span>
                        <img src="./assets/IMG/plus button mobile.png" alt="">
                    </button>

                    <input type="file" id="Filepicker" accept="image/jpeg,image/png" style="display: none;"
                        onchange="handleFileChange()">

                    <div id="uploaded_Files" class="Uploaded_FIles_Container"></div>

                </div>

                <div class="Subtasks_Container">
                    <label class="label" for="input_Subtasks">Subtasks</label>
                    <div class="Subtask_Inputfield_Container" id="subtaskBorderInputchange">
                        <input id="input_Subtasks" placeholder="Add new Subtask" class="Subtasks_Inputfield"
                            type="text">
                        <button id="add_Subtask" type="button" onclick="addCurrentSubtask()" class="Subtasks_Btn"><img
                                src="assets/IMG/add_subtask_img.svg" alt="Add Subtask"></button>
                        <div class="separatorSubtask"></div>

                        <img onclick="emptySubtask()" class="emptySubtaskicon" id="empty-subtask-icon"
                            src="assets/IMG/iconoir_cancel.png" alt="subtask leeren">
                    </div>
                </div>
                <div id="subtaskHeadContainer">
                    <div id="ul_subtasks" class="ul_subtasks">
                    </div>
                    <div id="SubtaskLengthReached"></div>
                </div>
                <div onclick="func1(event)" class="AssignedTO_Container">
                    <label class="label" for="select_container">Assigned to</label>
                    <div onclick="openList(event)" id="select_container" class="select_container" tabindex="0"
                        onkeydown="if(event.key==='Enter'||event.key===' ') openList(event)">
                        <span>Select contacts to assign </span>
                        <div class="arrow_img_container" id="arrow_img_container"> <img class="arrow_drop_downaa"
                                src="assets/IMG/arrow_drop_downaa.svg" alt=""></div>
                    </div>
                    <div id="Selection_Container" class="Selection_Container d_none">

                    </div>
                    <div id="Selected_profiles_Container" class="Selected_profiles_Container">
                    </div>
                </div>
            </div>
    </div>
    <div class="Btn_Container">
        <div class="required_info_Container"><span class="red">*</span><span class="fieldisrequired">This field is
                required</span></div>
        <div class="clear_COntainer" id="createNewTask">
            <button onclick="clearTask()" class="clear_Btn">Clear <img class="clear-icon"
                    src="assets/IMG/x_icon_clear.svg" alt="Formular leeren"></button>
            <button type="submit" form="form_addtask" onclick="createTask(event)" class="Create_Btn">Create Task
                <img class="create_icon" src="assets/IMG/clear_Img.svg" alt="Task erstellen"></button>
        </div>
    </div>

    </form>

    <section>
        <div id="newTaskIsReady"></div>


        <div w3-include-html="./assets/Templates/mobile_version.html"></div>
    </section>

    <div class="newContact" id="newContact" style="display:none;">
        <div class="contactCars-overview">
            <div class="leftside">
                <div class="leftsidehead">
                    <img class="newCard-logo" src="assets/IMG/Capa 1.png" alt="">
                    <h2 class="addcontactheadline">Add contact</h2>
                    <span class="addcontactsecondline">Tasks are better with a team!</span>
                    <div class="hrdiv">
                        <hr class="hrnewcontact">
                    </div>
                </div>
            </div>

            <div class="right-side">
                <div class="account-badge-side" id="accountBadgeSide" style="display:none;">
                    <div class="account-badge" id="accountBadge">
                        <span id="accountInitials"></span>
                        <img id="accountPhoto" src=""
                            style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    </div>
                    <label for="photoUpload" class="upload-label">
                        <img src="assets/IMG/camera.png" alt="Upload" style="width:20px;">
                    </label>
                    <input type="file" id="photoUpload" accept="image/*" style="display:none;"
                        onchange="handlePhotoUpload(event)">
                </div>

                <img src="assets/IMG/Close.svg" alt="Close" class="closethewindow-button" onclick="closeCardContact()">
                <div class="contactlogo">
                    <img class="addNewContactimg" src="assets/IMG/Group 13.png" alt="NewContactLogo">

                    <form onsubmit="return false;" id="contactForm">
                        <div class="input-container">
                            <div class="input-field name-icon" id="textInput">
                                <input type="text" id="name" name="Name" placeholder="Name" required>
                                <img src="assets/IMG/person.svg" alt="Person Icon" class="input-icon">
                            </div>
                            <div id="wrongText"></div>

                            <div class="input-fieldmail mail-icon" id="mailInput">
                                <input type="email" id="mail" name="Email" placeholder="Email" required>
                                <img src="assets/IMG/mail.svg" alt="Mail Icon" class="input-icon">
                            </div>
                            <div id="wrongEmail"></div>

                            <div class="input-fieldphone phone-icon" id="phoneInput">
                                <input type="tel" id="telephone" name="Phone" placeholder="Phone" required>
                                <img src="assets/IMG/call.svg" alt="Call Icon" class="input-icon">
                            </div>
                            <div id="wrongPhone"></div>
                        </div>
                        <div class="two-buttons">
                            <button type="button" class="cancel-button" onclick="closeCardContact()">Cancel<img
                                    class="close-button" src="assets/IMG/iconoir_cancel.png"></button>
                            <button onclick="saveEditedContact()" type="submit" class="createContact-button">Create
                                Contact<img src="assets/IMG/check.svg"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>




</body>




</html>
