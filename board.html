<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board</title>

    <link rel="stylesheet" href="./Styles/board.css">
    <link rel="stylesheet" href="./Styles/Desktop_template.css">
    <link rel="stylesheet" href="./Styles/add_task_responsive.css">
    <link rel="stylesheet" href="./Styles/fontStyles.css">
    <link rel="stylesheet" href="./Styles/mobile_tamplate.css">
    <link rel="stylesheet" href="./Styles/board_responsive.css">
    <link rel="stylesheet" href="./Styles/contact.css">
    <link rel="stylesheet" href="./Styles/contact_responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.css"
        integrity="sha512-9NawOLzuLE2GD22PJ6IPWXEjPalb/FpdH1qMpgXdaDM+0OfxEV75ZCle6KhZi0vM6ZWvMrNnIZv6YnsL+keVmA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./Styles/viewer-custom.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.js"
        integrity="sha512-lZD0JiwhtP4UkFD1mc96NiTZ14L7MjyX5Khk8PMxJszXMLvu7kjq1sp4bb0tcL6MY+/4sIuiUxubOqoueHrW4w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/contact.js"></script>
    <script src="./assets/js/contact_Template.js"></script>
    <script src="./assets/js/contact_Form_Validation.js"></script>
    <script src="./assets/js/board_Add_Task_Form_Validation.js"></script>
    <script src="./assets/js/board_Fetch_Task.js"></script>
    <script src="./assets/js/board.js"></script>
    <script src="./assets/js/board_Card.js"> </script>
    <script src="./assets/js/script_Template.js"></script>
    <script src="./assets/js/board_Database.js"></script>
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <script src="./assets/js/board_AddTask.js"></script>
    <script src="./assets/js/board_Template.js"></script>
    <script src="./assets/js/script_Sidebar.js"></script>
    <script src="./assets/js/board_Contact.js"></script>
   


    <link rel="icon" type="image/x-icon" href="./assets/IMG/Capa 2.png" />
</head>

<body onresize="setTimeout(() => redirect(), 300), handleResize()" onload="init()">
    <header>


        <div w3-include-html="./assets/Templates/desktop_template.html"></div>
        <div class="headblock">
            <div class="headblock-inner">
                <div class="title">
                    <span class="kanbanBoardTitle">Kanban Projekt Management Tool</span>
                    <img src="./assets/IMG/Capa 3.png" alt="MobileIcon" class="MobileIcon">
                </div>
                <div class="headUserContainer">
                    <a href="help.html" class="help-link">
                        <img src="./assets/IMG/help.png" alt="Hilfe" class="help-icon">
                    </a>
                    <div class="logInUser_Container" onclick="showLogOutSection();">
                        <span class="logInUser" id="loginUserId"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="logoutId"></div>

    </header>
    <div>


        <main class="board HeadContainerBoard backgrount-color">
            <div class="divBoard">
                <div class="boardtitle spaceBetween addTaskBoard">
                    <div class="titleButtonBoard">
                        <h1>Board</h1>
                        <div onclick="openTaskBoard()" class="buttonContainerSmall curser">
                            <img class="imgButton" src="./assets/IMG/add (1).png">
                        </div>
                    </div>
                    <div class="displayFlex alignCenter">
                        <div class="displayFlex searchContainer addTask">
                            <input onkeyup="search()" id="searchInput" class="search" type="text"
                                placeholder="Find Task....">
                            <div class="separator"></div>
                            <img class="searchIcon" src="./assets/IMG/Frame 122.png">
                        </div>
                        <button onclick="openTaskBoard()"
                            class="displayFlex button-d-none addTask buttonContainer curser addTaskButton">
                            <img src="./assets/IMG/add (1).png" alt="Add Icon"> Add task
                        </button>
                    </div>
                </div>

                <div id="overlay" class="overlay d-none">
                    <div id="todoBig" class="cardbig">
                        <!-- Hier wird die große ToDo-Anzeige eingefügt -->
                    </div>
                </div>

                <div class="spaceBetween1 boardtitle">
                    <!-- to do -->
                    <div class="paddingRight widthContainer">
                        <div class="statusButton">
                            <h2 class="text">To do</h2>
                            <img class="curser" onclick="openTaskBoard()" src="./assets/IMG/plus button.png"
                                alt="Open the add task form">
                        </div>
                        <div class="noTasks" category="open" style="display: none;">No tasks To do</div>
                        <div class="drag-area" id="open" ondrop="moveTo(event, 'open')"
                            ondragover="allowDrop(event), handleDragOver('open')" ondragleave="removeHighlight('open')">
                        </div>

                    </div>
                    <!-- in progress -->
                    <div class="paddingRight widthContainer">
                        <div class="statusButton">
                            <h2 class="text">In progress</h2>
                            <img class="curser" onclick="openTaskBoard()" src="./assets/IMG/plus button.png"
                                alt="Open the add task form">
                        </div>
                        <div class="noTasks" category="progress" style="display: none;">No tasks in progress</div>
                        <div class="drag-area" id="progress" ondrop="moveTo(event, 'progress')"
                            ondragover="allowDrop(event), handleDragOver('progress')"
                            ondragleave="removeHighlight('progress')"></div>
                    </div>
                    <!-- await feedback -->
                    <div class="paddingRight widthContainer">
                        <div class="statusButton">
                            <h2 class="text">Await feedback</h2>
                            <img class="curser" onclick="openTaskBoard()" src="./assets/IMG/plus button.png"
                                alt="Open the add task form">
                        </div>
                        <div class="noTasks" category="awaitFeedback" style="display: none;">No tasks Await feedback
                        </div>
                        <div class="drag-area" id="awaitFeedback" ondrop="moveTo(event, 'awaitFeedback')"
                            ondragover="allowDrop(event), handleDragOver('awaitFeedback')"
                            ondragleave="removeHighlight('awaitFeedback')"></div>
                    </div>
                    <!-- done -->
                    <div class="paddingRight widthContainer">
                        <div class="statusButton">
                            <h2 class="text">Done</h2>
                        </div>
                        <div class="noTasks" category="closed" style="display: none;">No tasks Done</div>
                        <div class="drag-area" id="closed" ondrop="moveTo(event, 'closed')"
                            ondragover="allowDrop(event), handleDragOver( 'closed')"
                            ondragleave="removeHighlight('closed')"></div>
                    </div>
                </div>
            </div>
        </main>



        <div>
            <div w3-include-html="./assets/Templates/board_add_task.html"></div>
        </div>


        <div>
            <div w3-include-html="./assets/Templates/mobile_version.html"></div>
        </div>

        <div id="darkOverlay" style="display: none;"></div>

    </div>
    <div class="newContact" id="newContact" style="display:none;">
        <div class="contactCars-overview">
            <div class="leftside">
                <div class="leftsidehead">
                    <img class="newCard-logo" src="assets/IMG/Capa 1.png" alt="">
                    <h2 class="addcontactheadline">Add contact</h2>
                    <span class="addcontactsecondline">Tasks are better with a team!</span>
                    <div class="hrdiv">
                        <hr class="hrnewcontact">
                    </div>
                </div>
            </div>

            <div class="right-side">
                <div class="account-badge-side" id="accountBadgeSide" style="display:none;">
                    <div class="account-badge" id="accountBadge">
                        <span id="accountInitials"></span>
                        <img id="accountPhoto" src=""
                            style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    </div>
                    <label for="photoUpload" class="upload-label">
                        <img src="assets/IMG/camera.png" alt="Upload" style="width:20px;">
                    </label>
                    <input type="file" id="photoUpload" accept="image/*" style="display:none;"
                        onchange="handlePhotoUpload(event)">
                </div>

                <img src="assets/IMG/Close.svg" alt="Close" class="closethewindow-button" onclick="closeCardContact()">
                <div class="contactlogo">
                    <img class="addNewContactimg" src="assets/IMG/Group 13.png" alt="NewContactLogo">

                    <form onsubmit="return false;" id="contactForm">
                        <div class="input-container">
                            <div class="input-field name-icon" id="textInput">
                                <input type="text" id="name" name="Name" placeholder="Name" required>
                                <img src="assets/IMG/person.svg" alt="Person Icon" class="input-icon">
                            </div>
                            <div id="wrongText"></div>

                            <div class="input-fieldmail mail-icon" id="mailInput">
                                <input type="email" id="mail" name="Email" placeholder="Email" required>
                                <img src="assets/IMG/mail.svg" alt="Mail Icon" class="input-icon">
                            </div>
                            <div id="wrongEmail"></div>

                            <div class="input-fieldphone phone-icon" id="phoneInput">
                                <input type="tel" id="telephone" name="Phone" placeholder="Phone" required>
                                <img src="assets/IMG/call.svg" alt="Call Icon" class="input-icon">
                            </div>
                            <div id="wrongPhone"></div>
                        </div>
                        <div class="two-buttons">
                            <button type="button" class="cancel-button" onclick="closeCardContact()">Cancel<img
                                    class="close-button" src="assets/IMG/iconoir_cancel.png"></button>
                            <button onclick="saveEditedContact()" type="submit" class="createContact-button">Create
                                Contact<img src="assets/IMG/check.svg"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>


</body>

</html>
